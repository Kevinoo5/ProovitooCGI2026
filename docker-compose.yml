services:
  # 1. Spring Boot Backend (Java 25)
  backend:
    build: ./backend
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:restoranidb
      - SPRING_H2_CONSOLE_ENABLED=true
    restart: unless-stopped

  # 2. React Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped